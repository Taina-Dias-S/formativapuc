
  discord:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.discord_hook }}
          status: ${{ needs.build.result }}
          content: "🚀"
          title: "Alerta do GitHub Actions"
          description: |
            Repositório: ${{ github.repository }}
            Autor: ${{ github.actor }}
            Status: ${{ needs.build.result }}
            Evento: ${{ github.event_name }}