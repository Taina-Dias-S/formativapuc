name: Discord Alert

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
      - uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.discord_hook }}
          status: success
          content: "🚀 TESTE DISCORD"
          title: "FUNCIONANDO!"